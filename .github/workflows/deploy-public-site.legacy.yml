name: Deploy Public Site to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.1.0"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        working-directory: ./
        run: bun install --frozen-lockfile

      - name: Lint public site
        working-directory: ./apps/public-site
        run: bun run lint

      - name: Type check public site
        working-directory: ./apps/public-site
        run: bun run type-check || true

      - name: Build public site
        working-directory: ./apps/public-site
        run: bun run build
        env:
          VITE_PB_URL: ${{ secrets.VITE_PB_URL || 'https://api.command-connect.id' }}
          VITE_APP_URL: https://command-connect.id

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: latest
          secrets: |
            VITE_PB_URL
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=command-connect-public

      - name: Comment PR with deployment info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Public site preview deployed. Once merged, it will deploy to Cloudflare Pages at https://command-connect.id'
            })
