name: Deploy Admin Panel to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/admin/**"
      - ".github/workflows/deploy-admin-panel.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/admin/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.1.0"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        working-directory: ./
        run: bun install --frozen-lockfile

      - name: Lint admin panel
        working-directory: ./apps/admin
        run: bun run lint

      - name: Type check admin panel
        working-directory: ./apps/admin
        run: bun run type-check || true

      - name: Build admin panel
        working-directory: ./apps/admin
        run: bun run build
        env:
          VITE_PB_URL: ${{ secrets.VITE_PB_URL || 'https://api.command-connect.id' }}
          VITE_ADMIN_APP_URL: https://admin.command-connect.id

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/admin/dist

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

      - name: Comment PR with deployment info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Admin panel preview deployed. Once merged, it will deploy to GitHub Pages at https://admin.command-connect.id'
            })
